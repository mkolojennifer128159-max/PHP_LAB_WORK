<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
    }
    .login-box {
        background: #ffffff;
        padding: 40px 35px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        width: 100%;
        max-width: 360px;
    }
    .login-box h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }
    .input-group {
        margin-bottom: 18px;
    }
    .input-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #555;
    }
    .input-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
    }
    .input-group input:focus {
        border-color: #4f46e5;
    }
    .error-message {
        color: #e11d48;
        font-size: 13px;
        margin-top: -10px;
        margin-bottom: 14px;
        display: none;
    }
    .login-btn {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }
    .login-btn:hover {
        background: #4338ca;
    }
    .extra-options {
        display: flex;
        justify-content: space-between;
        margin-top: 14px;
        font-size: 13px;
    }
    .extra-options a {
        color: #4f46e5;
        text-decoration: none;
    }
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <form id="loginForm" onsubmit="return validateForm()">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password">
        </div>
        <p class="error-message" id="errorMsg">Please fill in both username and password.</p>
        <button type="submit" class="login-btn">Login</button>
        <div class="extra-options">
            <a href="#">Forgot password?</a>
            <a href="#">Create account</a>
        </div>
    </form>
</div>

<script>
    function validateForm() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorMsg = document.getElementById("errorMsg");

        if (username === "" || password === "") {
            errorMsg.style.display = "block";
            return false;
        }

        errorMsg.style.display = "none";
        alert("Login Successful! Welcome, " + username + ".");
        return false;
    }
</script>

</body>
</html>
